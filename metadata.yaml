# yaml-language-server: $schema=https://raw.githubusercontent.com/sgnl-actions/schemas/main/metadata.schema.json
name: generic-webhook
description: Generic webhook action for making custom HTTP requests

# Input parameters for web form generation
inputs:
  method:
    type: text
    description: HTTP method (GET, POST, PUT, DELETE, PATCH, etc.)
    required: true
    validation:
      enum: ["GET", "POST", "PUT", "DELETE", "PATCH", "HEAD", "OPTIONS"]

  address:
    type: text
    description: Full URL to send the request to (overrides integration address)
    required: false
    validation:
      min: 1
      max: 500

  addressSuffix:
    type: text
    description: Path suffix to append to the base address
    required: false
    validation:
      max: 1000

  requestBody:
    type: text
    description: JSON request body to send
    required: false
    validation:
      max: 10000

  requestHeaders:
    type: text
    description: JSON object of custom headers to include
    required: false
    validation:
      max: 5000

  acceptedStatusCodes:
    type: array
    description: Additional status codes to treat as success (e.g., [404])
    required: false
    item_type: number
    validation:
      max: 10

# Expected output structure
outputs:
  status:
    type: text
    description: Operation result status

  data:
    type: object
    description: Response data containing statusCode, body, success, and executedAt

environment:
  ADDRESS:
    type: text
    description: Default target address for the request
    required: false
  OAUTH2_CLIENT_CREDENTIALS_AUDIENCE:
    type: text
    description: OAuth2 client credentials audience
    required: false
  OAUTH2_CLIENT_CREDENTIALS_AUTH_STYLE:
    type: text
    description: OAuth2 client credentials auth style
    required: false
  OAUTH2_CLIENT_CREDENTIALS_CLIENT_ID:
    type: text
    description: OAuth2 client credentials client ID
    required: false
  OAUTH2_CLIENT_CREDENTIALS_SCOPE:
    type: text
    description: OAuth2 client credentials scope
    required: false
  OAUTH2_CLIENT_CREDENTIALS_TOKEN_URL:
    type: text
    description: OAuth2 client credentials token URL
    required: false

secrets:
  BEARER_AUTH_TOKEN:
    type: text
    description: Bearer auth token
    required: false
  BASIC_USERNAME:
    type: text
    description: Basic auth username
    required: false
  BASIC_PASSWORD:
    type: text
    description: Basic auth password
    required: false
  OAUTH2_CLIENT_CREDENTIALS_CLIENT_SECRET:
    type: text
    description: OAuth2 client secret
    required: false
  OAUTH2_AUTHORIZATION_CODE_ACCESS_TOKEN:
    type: text
    description: OAuth2 authorization code access token
    required: false

# Auth is optional; if provided, one complete group must be satisfied.
optional_one_of:
  - ["secrets.BEARER_AUTH_TOKEN"]
  - ["secrets.BASIC_USERNAME", "secrets.BASIC_PASSWORD"]
  - [
      "secrets.OAUTH2_CLIENT_CREDENTIALS_CLIENT_SECRET",
      "environment.OAUTH2_CLIENT_CREDENTIALS_CLIENT_ID",
      "environment.OAUTH2_CLIENT_CREDENTIALS_TOKEN_URL",
    ]
  - ["secrets.OAUTH2_AUTHORIZATION_CODE_ACCESS_TOKEN"]
